<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high border-2 border-indigo-100 dark:border-indigo-900">

</div>

<div class="w-full max-w-md bg-surface-container-lowest rounded-[2rem] shadow-2xl shadow-indigo-100/50 flex flex-col overflow-hidden">
<!-- Display Area (Atmospheric Layering) -->
<div class="p-8 pb-10 flex flex-col items-end justify-end space-y-2 bg-surface">
<div class="text-on-surface-variant font-label text-sm tracking-wide opacity-60">
                    1,250 × 4
                </div>
<div class="text-6xl md:text-7xl font-headline font-extrabold text-on-surface tracking-tighter">
                    5,000
                </div>
</div>
<!-- Keypad Area -->
<div class="p-6 bg-surface-container-low grid grid-cols-4 gap-4">
<!-- Row 1: Functions -->
<button class="aspect-square flex items-center justify-center bg-white text-primary rounded-xl font-headline text-xl font-bold hover:bg-slate-50 active:scale-95 transition-all">
                    C
                </button>
<button class="aspect-square flex items-center justify-center bg-white text-primary rounded-xl font-headline text-xl font-bold hover:bg-slate-50 active:scale-95 transition-all">
                    ±
                </button>
<button class="aspect-square flex items-center justify-center bg-white text-primary rounded-xl font-headline text-xl font-bold hover:bg-slate-50 active:scale-95 transition-all">
                    %
                </button>
<button class="aspect-square flex items-center justify-center signature-gradient text-on-primary rounded-xl font-headline text-2xl font-bold hover:opacity-90 active:scale-95 transition-all">
                    ÷
                </button>
<!-- Row 2: 7-9 & Mult -->

<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">

                </button>
<button class="aspect-square flex items-center justify-center signature-gradient text-on-primary rounded-xl font-headline text-2xl font-bold hover:opacity-90 active:scale-95 transition-all">

                </button>
<!-- Row 3: 4-6 & Sub -->
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">

                </button>
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">

<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">

                </button>
<button class="aspect-square flex items-center justify-center signature-gradient text-on-primary rounded-xl font-headline text-2xl font-bold hover:opacity-90 active:scale-95 transition-all">
                    −
                </button>
<!-- Row 4: 1-3 & Add -->
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">
                    1
                </button>
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">
                    2
                </button>
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">

                </button>
<button class="aspect-square flex items-center justify-center signature-gradient text-on-primary rounded-xl font-headline text-2xl font-bold hover:opacity-90 active:scale-95 transition-all">
                    +
                </button>
<!-- Row 5: 0, Dec, Eq -->
<button class="col-span-2 flex items-center px-8 bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">
                    0
                </button>
<button class="aspect-square flex items-center justify-center bg-surface-container-high text-on-surface rounded-xl font-headline text-2xl font-semibold hover:bg-surface-container-highest active:scale-95 transition-all">
                    .
                </button>
<button class="aspect-square flex items-center justify-center signature-gradient text-on-primary rounded-xl font-headline text-3xl font-bold hover:opacity-95 active:scale-90 transition-all shadow-lg shadow-indigo-200">

<span class="font-headline font-bold text-slate-900 dark:text-white">OmniCalc</span>
<p class="font-label text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest">© 2024 OmniCalc Ethereal Logic. All rights reserved.</p>

<div class="flex gap-8">
<a class="font-label text-xs text-slate-500 hover:text-indigo-600 transition-all" href="#">Terms</a>
<a class="font-label text-xs text-slate-500 hover:text-indigo-600 transition-all" href="#">Privacy</a>
<a class="font-label text-xs text-slate-500 hover:text-indigo-600 transition-all" href="#">Support</a>
<a class="font-label text-xs text-slate-500 hover:text-indigo-600 transition-all" href="#">Contact</a>
