<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OmniCalc | Welcome Back</title>
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts: Manrope & Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-tertiary-container': '#ffd2be',
              'on-primary': '#ffffff',
              'tertiary-fixed-dim': '#ffb695',
              'on-secondary-fixed': '#07006c',
              'on-primary-fixed': '#100069',
              'primary-fixed-dim': '#c3c0ff',
              'surface-container-highest': '#e0e3e5',
              'on-error': '#ffffff',
              'error-container': '#ffdad6',
              'surface-container-low': '#f2f4f6',
              'inverse-surface': '#2d3133',
              'tertiary-fixed': '#ffdbcc',
              'surface-container-high': '#e6e8ea',
              error: '#ba1a1a',
              'primary-fixed': '#e3dfff',
              background: '#f7f9fb',
              'on-secondary-fixed-variant': '#2f2ebe',
              tertiary: '#7e3000',
              'surface-tint': '#5148d7',
              'inverse-primary': '#c3c0ff',
              'on-tertiary-fixed-variant': '#7b2f00',
              'on-secondary-container': '#fffbff',
              'surface-container': '#eceef0',
              surface: '#f7f9fb',
              outline: '#777587',
              'tertiary-container': '#a44100',
              'surface-container-lowest': '#ffffff',
              'on-primary-fixed-variant': '#372abf',
              'secondary-container': '#6063ee',
              'on-surface': '#191c1e',
              'on-surface-variant': '#464555',
              'surface-bright': '#f7f9fb',
              'on-tertiary': '#ffffff',
              primary: '#392cc1',
              'surface-variant': '#e0e3e5',
              'on-primary-container': '#dbd7ff',
              'primary-container': '#534ad9',
              'surface-dim': '#d8dadc',
              'on-tertiary-fixed': '#351000',
              'outline-variant': '#c7c4d8',
              'on-secondary': '#ffffff',
              secondary: '#4648d4',
              'inverse-on-surface': '#eff1f3',
              'on-background': '#191c1e',
              'secondary-fixed-dim': '#c0c1ff',
              'secondary-fixed': '#e1e0ff',
              'on-error-container': '#93000a',
            },
            fontFamily: {
              headline: ['Manrope', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
              label: ['Inter', 'sans-serif'],
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #392cc1 0%, #534ad9 100%);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Top Bar Navigation Shell - Suppressed for focus journey, but Logo remains for brand anchor -->
    <header class="w-full px-6 py-8 flex justify-center items-center absolute top-0 z-50 relative">
      <a
        class="absolute left-6 flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors group"
        href="#"
      >
        <span class="material-symbols-outlined text-xl" data-icon="chevron_left">chevron_left</span>
        <span class="font-label text-xs font-bold uppercase tracking-widest">Back</span>
      </a>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl" data-icon="calculate"
          >calculate</span
        >
        <span class="font-headline font-extrabold text-2xl tracking-tighter text-primary"
          >OmniCalc</span
        >
      </div>
    </header>
    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
      <!-- Atmospheric Background Elements (Ethereal Logic) -->
      <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[100px]"></div>
      <div
        class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary/5 rounded-full blur-[100px]"
      ></div>
      <div class="w-full max-w-md z-10">
        <!-- Login Card -->
        <div
          class="bg-surface-container-lowest shadow-[0_24px_48px_-12px_rgba(57,44,193,0.08)] rounded-xl overflow-hidden"
        >
          <div class="p-8 md:p-12">
            <!-- Heading -->
            <div class="mb-10 text-center">
              <h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-3">
                Welcome Back
              </h1>
              <p class="font-body text-on-surface-variant/80 text-sm">
                Please enter your details to continue your logic journey.
              </p>
            </div>
            <!-- Form -->
            <form class="space-y-6">
              <div class="space-y-1.5">
                <label
                  class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1"
                  for="email"
                  >Email</label
                >
                <div class="relative group">
                  <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors"
                    data-icon="mail"
                    >mail</span
                  >
                  <input
                    class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant/60"
                    id="email"
                    name="email"
                    placeholder="name@company.com"
                    required=""
                    type="email"
                  />
                </div>
              </div>
              <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                  <label
                    class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest"
                    for="password"
                    >Password</label
                  >
                  <a
                    class="font-label text-xs font-semibold text-primary hover:text-primary-container transition-colors"
                    href="#"
                    >Forgot Password?</a
                  >
                </div>
                <div class="relative group">
                  <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors"
                    data-icon="lock"
                    >lock</span
                  >
                  <input
                    class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all font-body text-on-surface placeholder:text-outline-variant/60"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required=""
                    type="password"
                  />
                  <button
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors"
                    type="button"
                  >
                    <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                  </button>
                </div>
              </div>
              <div class="pt-2">
                <button
                  class="w-full signature-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all hover:brightness-110 flex items-center justify-center gap-2"
                  type="submit"
                >
                  <span>Sign In</span>
                  <span class="material-symbols-outlined text-xl" data-icon="arrow_forward"
                    >arrow_forward</span
                  >
                </button>
              </div>
            </form>
            <!-- Divider -->
            <div class="relative my-10">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full h-px bg-surface-container-high"></div>
              </div>
              <div class="relative flex justify-center text-xs uppercase tracking-widest">
                <span class="bg-surface-container-lowest px-4 text-outline-variant font-bold"
                  >or continue with</span
                >
              </div>
            </div>
            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
              <button
                class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-low hover:bg-surface-container-high transition-colors font-body font-semibold text-sm text-on-surface"
              >
                <img
                  alt="Google"
                  class="w-5 h-5"
                  data-alt="Official Google G logo with clean white background and iconic four colors"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOPRzcMg2mXJpfSj0ba_ech_8CaXEFMXpMeGsN0uGDA0w3-foAEpff-TGUdVY1HIEda5lvYQg7DJ1asVSpuf7pRjbcT6GnpcRkpMa8GxEAWGn3dfSivTKYpvWnkOShVQjFnXchXrRFQpKVhmbT2u7ookOH0iaaMilC3m_H1pFg49BWgkvw62u5_Nt5sBdcRQgNdWrVpabBULbw41-dDOux202VevM-oJry6LmVsEWDuGeXVFacAEwcEkT6Ki3Sv_eaAX9E3GZXyC8K"
                />
                Google
              </button>
              <button
                class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-low hover:bg-surface-container-high transition-colors font-body font-semibold text-sm text-on-surface"
              >
                <span class="material-symbols-outlined text-2xl" data-icon="apple">ios</span>
                Apple
              </button>
            </div>
          </div>
          <!-- Footer/Switch Action -->
          <div class="py-6 bg-surface-container-low/50 text-center">
            <p class="font-body text-sm text-on-surface-variant">
              Don't have an account?
              <a
                class="text-primary font-bold hover:text-primary-container transition-colors ml-1"
                href="#"
                >Sign up</a
              >
            </p>
          </div>
        </div>
      </div>
    </main>
    <!-- Simple Footer for transactional screen -->
    <footer
      class="w-full py-8 px-8 flex flex-col md:flex-row justify-center items-center gap-6 opacity-60"
    >
      <p class="font-label text-xs text-on-surface-variant uppercase tracking-tighter">
        © 2024 OmniCalc Ethereal Logic. All rights reserved.
      </p>
      <div class="flex gap-6">
        <a
          class="font-label text-xs text-on-surface-variant hover:text-primary transition-all"
          href="#"
          >Privacy</a
        >
        <a
          class="font-label text-xs text-on-surface-variant hover:text-primary transition-all"
          href="#"
          >Terms</a
        >
        <a
          class="font-label text-xs text-on-surface-variant hover:text-primary transition-all"
          href="#"
          >Support</a
        >
      </div>
    </footer>
  </body>
</html>
