<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OmniCalc | Access Pro Workspace</title>
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-primary-container': '#fffbff',
              'secondary-container': '#d0e1fb',
              surface: '#f7f9fb',
              'on-secondary-container': '#54647a',
              'on-tertiary-container': '#000703',
              'inverse-on-surface': '#eff1f3',
              'surface-container-high': '#e6e8ea',
              'tertiary-container': '#00885d',
              'tertiary-fixed-dim': '#4edea3',
              'secondary-fixed-dim': '#b7c8e1',
              'primary-container': '#6063ee',
              'surface-container-low': '#f2f4f6',
              'on-primary-fixed': '#07006c',
              'on-tertiary-fixed-variant': '#005236',
              'on-secondary-fixed': '#0b1c30',
              'surface-container-highest': '#e0e3e5',
              'on-secondary': '#ffffff',
              'primary-fixed': '#e1e0ff',
              tertiary: '#006c49',
              'on-primary-fixed-variant': '#2f2ebe',
              'inverse-surface': '#2d3133',
              'surface-tint': '#494bd6',
              primary: '#4648d4',
              'outline-variant': '#c7c4d7',
              'on-error': '#ffffff',
              'surface-dim': '#d8dadc',
              'surface-container-lowest': '#ffffff',
              'on-surface': '#191c1e',
              'on-tertiary': '#ffffff',
              'error-container': '#ffdad6',
              'surface-bright': '#f7f9fb',
              secondary: '#505f76',
              'primary-fixed-dim': '#c0c1ff',
              background: '#f7f9fb',
              'on-primary': '#ffffff',
              'inverse-primary': '#c0c1ff',
              'on-tertiary-fixed': '#002113',
              outline: '#767586',
              'surface-container': '#eceef0',
              'surface-variant': '#e0e3e5',
              'secondary-fixed': '#d3e4fe',
              'on-secondary-fixed-variant': '#38485d',
              'on-surface-variant': '#464554',
              'on-background': '#191c1e',
              error: '#ba1a1a',
              'on-error-container': '#93000a',
              'tertiary-fixed': '#6ffbbe',
            },
            fontFamily: {
              headline: ['Manrope'],
              body: ['Inter'],
              label: ['Inter'],
            },
            borderRadius: { DEFAULT: '1rem', lg: '2rem', xl: '3rem', full: '9999px' },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
        display: inline-block;
        line-height: 1;
        vertical-align: middle;
      }
      body {
        background-color: #f7f9fb;
        background-image:
          radial-gradient(at 0% 0%, rgba(70, 72, 212, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 108, 73, 0.05) 0px, transparent 50%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body class="font-body text-on-surface min-h-screen flex items-center justify-center p-6">
    <!-- Background Decoration Elements (Asymmetric Layout) -->
    <div class="fixed top-20 left-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
    <div class="fixed bottom-20 right-10 w-96 h-96 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>
    <main class="w-full max-w-[480px]">
      <!-- Back Action -->
      <div class="mb-8 flex justify-start">
        <a
          class="group flex items-center gap-2 text-secondary hover:text-primary transition-colors text-sm font-medium"
          href="#"
        >
          <span
            class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform"
            >arrow_back</span
          >
          Back to Landing Page
        </a>
      </div>
      <!-- Auth Container -->
      <div class="glass-card shadow-[0_20px_40px_rgba(70,72,212,0.05)] rounded-lg p-8 md:p-12">
        <!-- Brand Anchor -->
        <div class="text-center mb-10">
          <div
            class="inline-flex items-center justify-center w-14 h-14 bg-primary rounded-2xl mb-4 shadow-lg shadow-primary/20"
          >
            <span
              class="material-symbols-outlined text-on-primary text-3xl"
              style="font-variation-settings: 'FILL' 1"
              >calculate</span
            >
          </div>
          <h1 class="font-headline text-3xl font-extrabold tracking-tighter text-primary">
            OmniCalc
          </h1>
          <p class="text-secondary text-sm mt-2 font-medium">Enter your workspace to continue.</p>
        </div>
        <!-- Social Providers -->
        <div class="space-y-3 mb-8">
          <button
            class="w-full flex items-center justify-center gap-3 px-6 py-3.5 bg-surface-container-lowest border border-outline-variant/30 rounded-full text-on-surface font-semibold text-sm hover:bg-surface-container-low transition-all active:scale-95"
          >
            <img
              alt="Google Logo"
              class="w-5 h-5"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtIwzrwGk-a6OT-lagbhdgwVc4Gm9ZwQMwTAwIkpOeOxEVyqxHmXXbrr69L8t8CY2_Tzs4rDc9pEgaIAIZc0j9YCf5BQauYby9brnQ2rjF-TR7Yka78SDeOVRYMkhqcjlSpPfjHH2icRLa-sJRsVolXnJLadaJdFTPkjNT-KkGcQn3_CNQNqgFTljESOG6sAD5ByfaKNdYdt-oQfIkoCv1RYOD1iplhF8NIjpMxLzpp2lrRDik2GlkoNOeEHVmsIVhWX2QYCqcbJ8"
            />
            Continue with Google
          </button>
          <button
            class="w-full flex items-center justify-center gap-3 px-6 py-3.5 bg-inverse-surface text-on-primary-container rounded-full font-semibold text-sm hover:opacity-90 transition-all active:scale-95"
          >
            <svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              ></path>
            </svg>
            Continue with GitHub
          </button>
        </div>
        <!-- Divider -->
        <div class="relative flex items-center mb-8">
          <div class="flex-grow border-t border-outline-variant/40"></div>
          <span class="flex-shrink mx-4 text-secondary text-xs font-bold tracking-widest uppercase"
            >or with Email</span
          >
          <div class="flex-grow border-t border-outline-variant/40"></div>
        </div>
        <!-- Form -->
        <form action="#" class="space-y-5">
          <div class="space-y-2">
            <label
              class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1"
              for="email"
              >Email Address</label
            >
            <input
              class="w-full bg-surface-container-high border-none rounded-DEFAULT px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all placeholder:text-outline"
              id="email"
              placeholder="name@company.com"
              type="email"
            />
          </div>
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label
                class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1"
                for="password"
                >Password</label
              >
              <a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot?</a>
            </div>
            <input
              class="w-full bg-surface-container-high border-none rounded-DEFAULT px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all placeholder:text-outline"
              id="password"
              placeholder="••••••••"
              type="password"
            />
          </div>
          <button
            class="w-full mt-2 py-4 bg-primary text-on-primary font-bold rounded-DEFAULT shadow-md hover:shadow-xl hover:shadow-primary/20 transition-all active:scale-[0.98]"
            type="submit"
          >
            Sign In to Workspace
          </button>
        </form>
        <!-- Toggle Switch -->
        <div class="mt-10 text-center">
          <p class="text-secondary text-sm">
            Don't have an account?
            <a
              class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1"
              href="#"
              >Create an account</a
            >
          </p>
        </div>
      </div>
      <!-- Footer / Legal Section -->
      <footer class="mt-8 text-center px-4">
        <p class="text-[10px] text-outline uppercase tracking-[0.2em] leading-relaxed">
          By continuing, you agree to OmniCalc's <br class="md:hidden" />
          <a class="text-secondary hover:text-primary transition-colors" href="#"
            >Terms of Service</a
          >
          and
          <a class="text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a
          >.
        </p>
      </footer>
    </main>
    <!-- Visual Anchor Image (Decorative) -->
    <div class="hidden lg:block fixed -bottom-20 -left-20 w-96 opacity-10 pointer-events-none">
      <img
        class="w-full h-auto"
        data-alt="Abstract mathematical geometric shapes floating in 3D space with soft studio lighting and indigo color palette"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX6nbMlgV7zko1lda7f9P-SBMTKPHjtFTl7t5NOi3S5wXOJ4VBYHS2nNBdP8fW0xmcs5UKBC6aTldW3Gi3tQcAs7clZ7TEyyF3-jKl4rlTfi_3uRMiHzANcHy80DZ13rOaPiLEK4Wt4p9p7pFFgFElYtGdRRg0RqVWO7u5ZfxBfbe77ly4D_3GRSw8LLocsy3K58VK0Te-ULGUSn8IyMjwhW5fkYim3-mB6RrIP-MfHhAVfT1q7fjbrpAW34snxCwFdNSmEp7XQh8"
      />
    </div>
  </body>
</html>
